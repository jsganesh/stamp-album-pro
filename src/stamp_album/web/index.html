<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StampAlbum Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
</head>
<body>
    <div id="app">
        <!-- Toolbar -->
        <header id="toolbar">
            <div class="toolbar-left">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="9" y1="9" x2="9" y2="21"/>
                    </svg>
                    <span>StampAlbum Pro</span>
                </div>
                <div class="toolbar-divider"></div>
                <button id="btn-new" title="New Album (Ctrl+N)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="12" y1="18" x2="12" y2="12"/>
                        <line x1="9" y1="15" x2="15" y2="15"/>
                    </svg>
                    New
                </button>
                <button id="btn-open" title="Open File (Ctrl+O)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                    </svg>
                    Open
                </button>
                <button id="btn-save" title="Save File (Ctrl+S)" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Save
                </button>
                <div class="toolbar-divider"></div>
                <button id="btn-export" title="Export PDF (Ctrl+E)" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="12" y1="18" x2="12" y2="12"/>
                        <polyline points="9 15 12 18 15 15"/>
                    </svg>
                    Export PDF
                </button>
            </div>
            <div class="toolbar-center">
                <span id="file-name">Untitled</span>
                <span id="save-status" class="save-status"></span>
            </div>
            <div class="toolbar-right">
                <label class="toggle-visual">
                    <input type="checkbox" id="toggle-visual">
                    <span>Visual</span>
                </label>
                <label class="toggle-preview">
                    <input type="checkbox" id="toggle-preview" checked>
                    <span>Preview</span>
                </label>
                <label class="toggle-sidebar">
                    <input type="checkbox" id="toggle-sidebar">
                    <span>Files</span>
                </label>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content">
            <!-- File Browser Sidebar -->
            <aside id="sidebar" class="sidebar-hidden">
                <div class="sidebar-header">
                    <h3>Files</h3>
                    <button id="btn-upload" title="Upload .slbum file">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </button>
                </div>
                <div id="file-list" class="file-list"></div>
                <input type="file" id="file-input" accept=".slbum,.txt" hidden>
            </aside>

            <!-- Editor Panel -->
            <section id="editor-panel">
                <div id="editor-container"></div>
            </section>

            <!-- Preview Panel -->
            <section id="preview-panel">
                <div class="preview-toolbar">
                    <span id="preview-status">Ready</span>
                    <div class="preview-actions">
                        <button id="btn-refresh-preview" title="Refresh Preview">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10"/>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="preview-container">
                    <iframe id="preview-frame" sandbox="allow-same-origin"></iframe>
                    <div id="visual-overlay" class="visual-hidden"></div>
                </div>
            </section>
        </main>

        <!-- Visual Toolbox -->
        <aside id="visual-toolbox" class="toolbox-hidden">
            <div class="toolbox-header">
                <h3>Elements</h3>
            </div>
            <div class="toolbox-section">
                <h4>Text</h4>
                <div class="toolbox-item" draggable="true" data-type="text" data-align="left">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="4 7 4 4 20 4 20 7"/>
                        <line x1="9" y1="20" x2="15" y2="20"/>
                        <line x1="12" y1="4" x2="12" y2="20"/>
                    </svg>
                    <span>Left Text</span>
                </div>
                <div class="toolbox-item" draggable="true" data-type="text" data-align="center">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="4 7 4 4 20 4 20 7"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                    </svg>
                    <span>Center Text</span>
                </div>
                <div class="toolbox-item" draggable="true" data-type="text" data-align="right">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="4 7 4 4 20 4 20 7"/>
                        <line x1="15" y1="20" x2="15" y2="4"/>
                    </svg>
                    <span>Right Text</span>
                </div>
            </div>
            <div class="toolbox-section">
                <h4>Stamps</h4>
                <div class="toolbox-item" draggable="true" data-type="stamp" data-shape="rectangle" data-w="40" data-h="30">
                    <div class="stamp-preview rect"></div>
                    <span>Rectangle</span>
                </div>
                <div class="toolbox-item" draggable="true" data-type="stamp" data-shape="oval" data-w="40" data-h="30">
                    <div class="stamp-preview oval"></div>
                    <span>Oval</span>
                </div>
                <div class="toolbox-item" draggable="true" data-type="stamp" data-shape="diamond" data-w="40" data-h="30">
                    <div class="stamp-preview diamond"></div>
                    <span>Diamond</span>
                </div>
                <div class="toolbox-item" draggable="true" data-type="stamp" data-shape="triangle" data-w="40" data-h="30">
                    <div class="stamp-preview triangle"></div>
                    <span>Triangle</span>
                </div>
            </div>
            <div class="toolbox-section">
                <h4>Layout</h4>
                <div class="toolbox-item" draggable="true" data-type="row" data-style="FS">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                    </svg>
                    <span>Fixed Row</span>
                </div>
                <div class="toolbox-item" draggable="true" data-type="row" data-style="ES">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="9" y1="9" x2="9" y2="21"/>
                    </svg>
                    <span>Equal Row</span>
                </div>
            </div>
        </aside>

        <!-- Status Bar -->
        <footer id="status-bar">
            <span id="status-left">Ready</span>
            <span id="status-right"></span>
        </footer>
    </div>

    <!-- Hidden form for save dialog -->
    <form id="save-form" hidden>
        <input type="text" id="save-filename" placeholder="filename.slbum">
    </form>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
