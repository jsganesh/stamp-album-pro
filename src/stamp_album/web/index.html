<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StampAlbum Pro</title>
        <style>
        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: #1a1a2e; --bg-secondary: #16213e; --bg-tertiary: #0f3460;
            --accent: #e94560; --accent-hover: #ff6b6b; --text-primary: #eee; --text-muted: #888;
            --border: #333; --success: #4caf50;
            --sidebar-w: 220px; --props-w: 240px; --toolbar-h: 48px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ── Top Toolbar ── */
        #toolbar { height: var(--toolbar-h); background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; padding: 0 12px; flex-shrink: 0; }
        #toolbar .logo { font-weight: 700; font-size: 16px; color: var(--accent); margin-right: 16px; }
        #toolbar button { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        #toolbar button:hover { background: var(--accent); }
        #toolbar .spacer { flex: 1; }
        #toolbar .toggle-dsl { font-size: 11px; }

        /* ── Main Layout ── */
        #main { display: flex; flex: 1; overflow: hidden; }

        /* ── Left Sidebar: Element Palette ── */
        #sidebar { width: var(--sidebar-w); background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        #sidebar .section-title { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; padding: 12px 12px 6px; }
        #sidebar .element-palette { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 0 8px 12px; }
        .palette-item { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 8px 4px; text-align: center; cursor: grab; transition: all 0.15s; user-select: none; }
        .palette-item:hover { border-color: var(--accent); background: rgba(233,69,96,0.1); }
        .palette-item .icon { font-size: 18px; display: block; margin-bottom: 2px; }
        .palette-item .label { font-size: 9px; color: var(--text-muted); }

        /* ── Canvas Area ── */
        #canvas-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #canvas-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
        #canvas-toolbar label { font-size: 11px; color: var(--text-muted); }
        #canvas-toolbar select, #canvas-toolbar input[type="color"] { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        #canvas-toolbar input[type="color"] { width: 32px; height: 24px; padding: 2px; cursor: pointer; }
        #canvas-toolbar .spacer { flex: 1; }

        #page-canvas { flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 20px; background: #2a2a2a; }
        .page { background: white; box-shadow: 0 4px 24px rgba(0,0,0,0.4); position: relative; flex-shrink: 0; }
        .page.a4 { width: 595px; height: 842px; }  /* 210mm x 297mm at 72dpi */
        .page.letter { width: 612px; height: 792px; }

        /* ── Canvas Elements ── */
        .canvas-el { position: absolute; cursor: move; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .canvas-el:hover { outline: 2px dashed var(--accent); outline-offset: 2px; }
        .canvas-el.selected { outline: 2px solid var(--accent); outline-offset: 2px; z-index: 100; }
        .canvas-el .el-label { font-size: 9px; color: #333; text-align: center; pointer-events: none; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .canvas-el .el-img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .canvas-el .resize-handle { position: absolute; width: 8px; height: 8px; background: var(--accent); border: 1px solid #fff; border-radius: 1px; z-index: 200; display: none; }
        .canvas-el.selected .resize-handle { display: block; }
        .resize-handle.nw { top: -4px; left: -4px; cursor: nw-resize; }
        .resize-handle.ne { top: -4px; right: -4px; cursor: ne-resize; }
        .resize-handle.sw { bottom: -4px; left: -4px; cursor: sw-resize; }
        .resize-handle.se { bottom: -4px; right: -4px; cursor: se-resize; }
        .resize-handle.n { top: -4px; left: 50%; margin-left: -4px; cursor: n-resize; }
        .resize-handle.s { bottom: -4px; left: 50%; margin-left: -4px; cursor: s-resize; }
        .resize-handle.e { right: -4px; top: 50%; margin-top: -4px; cursor: e-resize; }
        .resize-handle.w { left: -4px; top: 50%; margin-top: -4px; cursor: w-resize; }

        /* ── Shapes ── */
        .canvas-el.shape-oval { border-radius: 50%; }
        .canvas-el.shape-diamond { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        .canvas-el.shape-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .canvas-el.shape-hexagon { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
        .canvas-el.shape-octagon { clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); }
        .canvas-el.shape-pentagon { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }

        /* ── Right Panel: Properties ── */
        #props-panel { width: var(--props-w); background: var(--bg-secondary); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        #props-panel .section-title { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; padding: 12px 12px 6px; }
        #props-panel .prop-row { display: flex; align-items: center; gap: 8px; padding: 6px 12px; }
        #props-panel .prop-row label { font-size: 11px; color: var(--text-muted); min-width: 60px; }
        #props-panel .prop-row input, #props-panel .prop-row select { flex: 1; background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        #props-panel .prop-row input[type="color"] { width: 32px; height: 24px; padding: 2px; cursor: pointer; flex: none; }
        #props-panel .prop-row input[type="number"] { width: 60px; flex: none; }
        #props-panel .no-selection { padding: 20px; text-align: center; color: var(--text-muted); font-size: 12px; }

        /* ── DSL Panel (Bottom, Collapsible) ── */
        #dsl-panel { height: 0; overflow: hidden; background: var(--bg-secondary); border-top: 1px solid var(--border); display: flex; flex-direction: column; transition: height 0.3s; }
        #dsl-panel.open { height: 200px; }
        #dsl-panel .dsl-header { display: flex; align-items: center; padding: 8px 12px; gap: 8px; border-bottom: 1px solid var(--border); }
        #dsl-panel .dsl-header span { font-size: 12px; font-weight: 600; }
        #dsl-panel .dsl-header button { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        #dsl-panel .dsl-header .spacer { flex: 1; }
        #dsl-editor { flex: 1; overflow: auto; }
        #dsl-editor textarea { width: 100%; height: 100%; background: var(--bg-primary); color: var(--text-primary); border: none; resize: none; font-family: monospace; font-size: 12px; padding: 12px; outline: none; }

        /* ── Drop Zone Highlight ── */
        .page.drag-over { outline: 3px dashed var(--accent); outline-offset: -3px; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>

<!-- Top Toolbar -->
<header id="toolbar">
    <span class="logo">StampAlbum Pro</span>
    <button id="btn-new">✚ New</button>
    <button id="btn-open">📂 Open</button>
    <button id="btn-save">💾 Save</button>
    <button id="btn-export-pdf">📄 Export PDF</button>
    <span class="spacer"></span>
    <button id="btn-toggle-dsl" class="toggle-dsl">🔧 Show DSL</button>
</header>

<!-- Main Content -->
<div id="main">

    <!-- Left Sidebar: Element Palette -->
    <aside id="sidebar">
        <div class="section-title">Stamps</div>
        <div class="element-palette" id="stamp-palette">
            <div class="palette-item" draggable="true" data-type="stamp" data-shape="rectangle"><span class="icon">▬</span><span class="label">Rectangle</span></div>
            <div class="palette-item" draggable="true" data-type="stamp" data-shape="oval"><span class="icon">●</span><span class="label">Oval</span></div>
            <div class="palette-item" draggable="true" data-type="stamp" data-shape="diamond"><span class="icon">◆</span><span class="label">Diamond</span></div>
            <div class="palette-item" draggable="true" data-type="stamp" data-shape="triangle"><span class="icon">▲</span><span class="label">Triangle</span></div>
            <div class="palette-item" draggable="true" data-type="stamp" data-shape="hexagon"><span class="icon">⬡</span><span class="label">Hexagon</span></div>
            <div class="palette-item" draggable="true" data-type="stamp" data-shape="octagon"><span class="icon">⯃</span><span class="label">Octagon</span></div>
            <div class="palette-item" draggable="true" data-type="stamp" data-shape="pentagon"><span class="icon">⬠</span><span class="label">Pentagon</span></div>
        </div>
        <div class="section-title">Text</div>
        <div class="element-palette" id="text-palette">
            <div class="palette-item" draggable="true" data-type="text" data-subtype="label"><span class="icon">T</span><span class="label">Label</span></div>
            <div class="palette-item" draggable="true" data-type="text" data-subtype="heading"><span class="icon">H</span><span class="label">Heading</span></div>
            <div class="palette-item" draggable="true" data-type="text" data-subtype="description"><span class="icon">¶</span><span class="label">Description</span></div>
        </div>
        <div class="section-title">Images</div>
        <div class="element-palette" id="image-palette">
            <div class="palette-item" draggable="true" data-type="image"><span class="icon">🖼</span><span class="label">Stamp Image</span></div>
            <div class="palette-item" id="btn-upload-img"><span class="icon">📤</span><span class="label">Upload...</span></div>
        </div>
        <input type="file" id="img-upload-input" accept="image/*" hidden>
    </aside>

    <!-- Canvas Area -->
    <section id="canvas-area">
        <div id="canvas-toolbar">
            <label>Page:</label>
            <select id="page-size">
                <option value="a4">A4 (210×297mm)</option>
                <option value="letter">Letter (8.5×11")</option>
                <option value="a3">A3 (297×420mm)</option>
            </select>
            <label>Grid:</label>
            <select id="grid-snap">
                <option value="0">Off</option>
                <option value="5">5mm</option>
                <option value="10">10mm</option>
            </select>
            <span class="spacer"></span>
            <button id="btn-undo">↩ Undo</button>
            <button id="btn-redo">↪ Redo</button>
            <button id="btn-delete-el">🗑 Delete</button>
        </div>
        <div id="page-canvas">
            <div class="page a4" id="page"></div>
        </div>
    </section>

    <!-- Right Panel: Properties -->
    <aside id="props-panel">
        <div class="no-selection">Select an element to edit its properties</div>
        <div id="props-content" style="display:none">
            <div class="section-title">Position & Size</div>
            <div class="prop-row"><label>X</label><input type="number" id="prop-x" step="1"><label>Y</label><input type="number" id="prop-y" step="1"></div>
            <div class="prop-row"><label>W</label><input type="number" id="prop-w" step="1"><label>H</label><input type="number" id="prop-h" step="1"></div>
            <div class="section-title">Border</div>
            <div class="prop-row"><label>Style</label><select id="prop-border-style"><option value="solid">Solid</option><option value="double">Double</option><option value="dashed">Dashed</option><option value="dotted">Dotted</option><option value="none">None</option></select></div>
            <div class="prop-row"><label>Color</label><input type="color" id="prop-border-color" value="#000000"><label>Width</label><input type="number" id="prop-border-width" value="1" min="0" max="5" step="0.5">pt</div>
            <div class="section-title">Fill</div>
            <div class="prop-row"><label>Color</label><input type="color" id="prop-fill-color" value="#ffffff"><label>Opacity</label><input type="range" id="prop-fill-opacity" min="0" max="100" value="100">%</div>
            <div class="section-title">Label</div>
            <div class="prop-row"><label>Text</label><input type="text" id="prop-label" placeholder="Stamp description"></div>
            <div class="section-title" id="img-section" style="display:none">Image</div>
            <div class="prop-row" id="img-row" style="display:none"><button id="btn-change-img" style="flex:1">Change Image</button><button id="btn-remove-img">✕</button></div>
        </div>
    </aside>

</div>

<!-- DSL Panel (Bottom, Collapsible) -->
<div id="dsl-panel">
    <div class="dsl-header">
        <span>DSL Editor (Advanced)</span>
        <span class="spacer"></span>
        <button id="btn-apply-dsl">Apply DSL</button>
        <button id="btn-close-dsl">✕ Close</button>
    </div>
    <div id="dsl-editor"><textarea id="dsl-textarea" spellcheck="false"></textarea></div>
</div>

<script src="app.js"></script>
<input type="file" id="file-input" accept=".slbum,.txt" hidden>
</body>
</html>
